# sops-nix configuration — defines who can decrypt secrets.
#
# Add a new machine: derive its recipient with
#   cat /etc/ssh/ssh_host_ed25519_key.pub | nix run nixpkgs#ssh-to-age
# add it below + to the key_groups, then run: sops updatekeys secrets/secrets.yaml
keys:
  - &deep age16gtkkvx0hn8gpjtzua535mf293e9amufze8ertplzjq9wm5v7suq6kklef
  - &zephyrion age126skdq485tknusy8uvhjm3rw4k0j40zdecrwsdcpjywj6j2xfvfsupptpn

creation_rules:
  - path_regex: secrets/[^/]+\.yaml$
    key_groups:
      - age:
          - *deep
          - *zephyrion
